<ion-header class="ion-no-border">
  <ion-toolbar class="main-toolbar">
    <ion-title>EchoDiary</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" class="logout-btn">
        <ion-icon [icon]="logOutOutline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar class="segment-toolbar">
    <ion-segment
      [(ngModel)]="activeFilter"
      (ionChange)="filterEntries()"
      mode="ios"
    >
      <ion-segment-button value="all">
        <ion-label>All</ion-label>
      </ion-segment-button>
      <ion-segment-button value="public">
        <ion-label>Public</ion-label>
      </ion-segment-button>
      <ion-segment-button value="private">
        <ion-label>Private</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="welcome-card">
    <div class="welcome-text">
      <h2>Hello, {{ userEmail.split('@')[0] }}! 👋</h2>
      <p>Capture your thoughts for today.</p>
    </div>
    <ion-button fill="clear" class="add-entry-fab" (click)="goToAddEntry()">
      <ion-icon [icon]="pencilOutline"></ion-icon>
    </ion-button>
  </div>

  <div *ngIf="filteredEntries.length === 0" class="empty-state">
    <div class="empty-icon-wrapper">
      <ion-icon [icon]="leafOutline"></ion-icon>
    </div>
    <h3>Peaceful & Quiet</h3>
    <p>Your diary is waiting for its first story.</p>
  </div>

  <div
    *ngFor="let entry of filteredEntries; let i = index"
    class="entry-card"
    [style.animation-delay]="(i * 0.05) + 's'"
    (click)="viewEntry(entry.id)"
  >
    <div class="card-header">
      <div class="title-group">
        <h4>{{ entry.title || 'A Moment in Time' }}</h4>
        <div
          class="privacy-indicator"
          [class.is-public]="entry.privacy === 'public'"
        >
          <ion-icon
            [icon]="entry.privacy === 'public' ? globeOutline : lockClosedOutline"
          ></ion-icon>
          <span>{{ entry.privacy }}</span>
        </div>
      </div>
      <ion-button
        fill="clear"
        color="medium"
        (click)="deleteEntry(entry.id, $event)"
      >
        <ion-icon [icon]="trashBinOutline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <p class="content-preview">{{ entry.content }}</p>

    <div class="card-footer">
      <div class="date-info">
        <ion-icon [icon]="timeOutline"></ion-icon>
        <time>{{ formatDate(entry.date) }}</time>
      </div>
      <ion-icon [icon]="chevronForwardOutline" class="arrow-icon"></ion-icon>
    </div>
  </div>
</ion-content>
