<ion-header class="ion-no-border">
  <ion-toolbar class="main-toolbar">
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/home"
        class="back-button"
      ></ion-back-button>
    </ion-buttons>
    <ion-title>New Entry</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <!-- Title Input -->
    <div class="input-group">
      <div class="input-label">
        <ion-icon [icon]="createOutline"></ion-icon>
        <span>Title <span class="optional">(Optional)</span></span>
      </div>
      <ion-item lines="none" class="custom-input">
        <ion-input
          [(ngModel)]="title"
          type="text"
          placeholder="Give your entry a title..."
          class="title-input"
        ></ion-input>
      </ion-item>
    </div>

    <!-- Content Input -->
    <div class="input-group">
      <div class="input-label">
        <ion-icon [icon]="documentTextOutline"></ion-icon>
        <span>Content <span class="required">*</span></span>
      </div>
      <ion-item lines="none" class="custom-input textarea-input">
        <ion-textarea
          [(ngModel)]="content"
          rows="12"
          placeholder="Write your thoughts here..."
          class="content-textarea"
        ></ion-textarea>
      </ion-item>
    </div>

    <!-- Privacy Setting -->
    <div class="input-group">
      <div class="input-label">
        <ion-icon [icon]="lockClosedOutline"></ion-icon>
        <span>Privacy Setting</span>
      </div>
      <div class="privacy-options">
        <div
          class="privacy-option"
          [class.active]="privacy === 'private'"
          (click)="privacy = 'private'"
        >
          <ion-icon [icon]="lockClosedOutline"></ion-icon>
          <div class="option-text">
            <strong>Private</strong>
            <small>Only visible to you</small>
          </div>
        </div>
        <div
          class="privacy-option"
          [class.active]="privacy === 'public'"
          (click)="privacy = 'public'"
        >
          <ion-icon [icon]="globeOutline"></ion-icon>
          <div class="option-text">
            <strong>Public</strong>
            <small>Visible to everyone</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <ion-button expand="block" class="save-button" (click)="saveEntry()">
      <ion-icon [icon]="saveOutline" slot="start"></ion-icon>
      Save Entry
    </ion-button>
  </div>
</ion-content>
