<ion-content class="ion-padding">
  <div class="splash-container">
    <div class="logo-wrapper">
      <div class="logo-backdrop"></div>
      <img
        src="../../../assets/EchoDiaryLogo.png"
        alt="EchoDiary Logo"
        class="splash-logo"
      />
    </div>

    <div class="text-container">
      <h1 class="splash-title">EchoDiary</h1>
      <p class="splash-subtitle">Your Voice, Your Memories</p>
      <div class="tagline-container">
        <p class="tagline">Every story matters</p>
      </div>
    </div>

    <div class="loader-container">
      <div class="custom-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="loading-text">Loading your diary...</p>
    </div>
  </div>
</ion-content>
