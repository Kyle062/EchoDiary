<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="ion-text-center">EchoDiary</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img
          src="../../../assets/EchoDiaryLogo.png"
          alt="EchoDiary Logo"
          class="login-logo"
          onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex'"
        />
        <div class="logo-fallback">
          <ion-icon name="book-outline"></ion-icon>
          <span>EchoDiary</span>
        </div>
      </div>
      <h2 class="welcome-title">Welcome Back</h2>
      <p class="welcome-subtitle">Sign in to continue your diary journey</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onLogin()" class="login-form">
      <!-- Email Input -->
      <div class="input-wrapper">
        <ion-item lines="none" class="custom-input" [class.focused]="email.length > 0">
          <ion-icon name="mail-outline" slot="start" class="input-icon"></ion-icon>
          <ion-label position="floating" class="custom-label">Email Address</ion-label>
          <ion-input
            type="email"
            placeholder=" "
            [(ngModel)]="email"
            name="email"
            required
            [clearInput]="true"
            class="custom-ion-input"
          ></ion-input>
        </ion-item>
      </div>

      <!-- Password Input -->
      <div class="input-wrapper">
        <ion-item lines="none" class="custom-input" [class.focused]="password.length > 0">
          <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
          <ion-label position="floating" class="custom-label">Password</ion-label>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder=" "
            [(ngModel)]="password"
            name="password"
            required
            class="custom-ion-input"
          ></ion-input>
          <ion-button
            fill="clear"
            slot="end"
            class="password-toggle-btn"
            (click)="togglePasswordVisibility(); $event.preventDefault()"
          >
            <ion-icon
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              class="password-toggle-icon"
            ></ion-icon>
          </ion-button>
        </ion-item>
      </div>

      <!-- Forgot Password -->
      <div class="forgot-password">
        <a (click)="onForgotPassword(); $event.preventDefault()" class="forgot-link">
          Forgot Password?
        </a>
      </div>

      <!-- Sign In Button -->
      <ion-button
        expand="block"
        class="login-button"
        type="submit"
        [disabled]="!email || !password || isLoading"
      >
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
        <ion-spinner *ngIf="isLoading" name="dots" slot="end" style="width: 20px; height: 20px;"></ion-spinner>
      </ion-button>
    </form>

    <!-- Register Link -->
    <div class="register-section">
      <p class="register-text">
        New to EchoDiary?
        <a routerLink="/register" class="register-link">Create an account</a>
      </p>
    </div>
  </div>
</ion-content>
